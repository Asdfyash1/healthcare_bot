{% extends 'base.html' %}

{% block title %}Delete Q&A - HealthBot AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card text-center">
            <i class="bi bi-exclamation-triangle" style="font-size: 3rem; color: #ff6b6b;"></i>
            <h2 class="page-title mt-3">Confirm Delete</h2>
            <p style="color: var(--text-secondary);">
                Are you sure you want to delete the Q&A entry:
            </p>
            <p style="font-weight: 700; font-size: 1.2rem; color: var(--accent-blue);">
                "{{ qna.label }}"
            </p>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">
                This action cannot be undone.
            </p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn" style="background: rgba(234,23,58,0.2); color: #ff6b6b; border: 1px solid rgba(234,23,58,0.3); border-radius: 10px; padding: 0.7rem 2rem; font-weight: 600;">
                        <i class="bi bi-trash3 me-1"></i>Delete
                    </button>
                    <a href="{% url 'manage_qa' %}" class="btn" style="background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); border-radius: 10px; padding: 0.7rem 2rem;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
